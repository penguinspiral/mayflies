# Commit Check GitHub Action configuration file
# More info at https://commit-check.github.io/
---
name: Commit Check

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  commit-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: # use permissions because use of pr-comments
      contents: read
      pull-requests: write
    # release-please generates an invalid branch: 'release-please--branches--main'
    # release-please generates an invalid (non-imperative) commit: 'chore(main): release 1.0.0'
    if: "!startsWith(github.head_ref, 'release-please--branches--main')"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }} # checkout PR HEAD commit
          fetch-depth: 0 # required for merge-base check

      - uses: commit-check/commit-check-action@443fb6a114414358496e6243105294c3b11610c5 # v2.4.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # use GITHUB_TOKEN because use of pr-comments
        with:
          message: true
          branch: true
          author-name: true
          author-email: true
          job-summary: true
          pr-comments: ${{ github.event_name == 'pull_request' }}
